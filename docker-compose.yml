version: '3.8'

services:
  mongo:
    image: mongo:6
    container_name: skillforge-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: skillforge

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: skillforge-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/skillforge
      JWT_SECRET: dev-secret-change-in-production
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

volumes:
  mongo_data:
